<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAROUNE.STORE</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#1a0000,#330000);
color:white;
text-align:center;
scroll-behavior:smooth;
}

header{
background:linear-gradient(90deg,red,orange);
padding:20px;
font-size:30px;
font-weight:bold;
letter-spacing:3px;
}

nav{
background:#111;
padding:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

section{
padding:70px 20px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

section.show{
opacity:1;
transform:translateY(0);
}

.card{
background:#1a1a1a;
padding:15px;
margin:15px;
border-radius:12px;
border:2px solid orange;
display:inline-block;
width:250px;
transition:0.3s;
}

.card:hover{
transform:scale(1.08);
border-color:red;
}

img,video{
width:100%;
border-radius:10px;
}

input{
padding:10px;
width:250px;
margin:8px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
background:orange;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:red;
color:white;
}

footer{
background:#111;
padding:15px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
🔥 HAROUNE.STORE 🔥
</header>

<nav>
<a href="#home">الرئيسية</a>
<a href="#products">المنتجات</a>
<a href="#register">تسجيل</a>
<a href="#payment">الدفع</a>
</nav>

<section id="home">
<h2>مرحبا بك في متجر HAROUNE.STORE</h2>
<p>جميع خدمات الانترنت موجودة 💎🔥</p>
</section>

<section id="products">
<h2>🛒 المنتجات</h2>

<div class="card">
<img src="https://via.placeholder.com/400x300">
<h3>خدمة رقمية</h3>
<p>وصف الخدمة هنا</p>
<button>طلب الآن</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x300">
<h3>منتج آخر</h3>
<p>وصف المنتج</p>
<button>طلب الآن</button>
</div>

</section>

<section id="register">
<h2>🔐 تسجيل حساب</h2>
<input type="text" placeholder="الاسم">
<br>
<input type="email" placeholder="البريد الإلكتروني">
<br>
<input type="password" placeholder="كلمة المرور">
<br>
<button onclick="welcome()">تسجيل</button>
</section>

<section id="payment">
<h2>💳 طرق الدفع</h2>
<p>بريدي موب - CCP - PayPal - تحويل بنكي</p>
</section>

<footer>
© 2026 HAROUNE.STORE جميع الحقوق محفوظة
</footer>

<script>
const sections = document.querySelectorAll("section");

window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
if(sec.getBoundingClientRect().top < window.innerHeight-100){
sec.classList.add("show");
}
});
});

function welcome(){
let msg = new SpeechSynthesisUtterance("مرحبا بك في متجر هارون ستور جميع خدمات الانترنت موجودة");
msg.lang="ar-SA";
msg.pitch=1.4;
speechSynthesis.speak(msg);
alert("تم التسجيل بنجاح 🔥");
}
</script>

</body>
</html>